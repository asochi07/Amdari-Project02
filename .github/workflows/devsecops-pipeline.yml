# =============================================================================
# SecureFlow DevSecOps Pipeline
# VaultBridge Financial Technologies
# =============================================================================
# This pipeline enforces a differentiated gate policy:
#   - DevSecOps-owned findings (secrets, CVEs, IaC, K8s): HARD-FAIL
#   - AppSec-owned findings (SQLi, IDOR, XSS, CSRF):      SOFT-FAIL + route
# =============================================================================

name: SecureFlow DevSecOps Pipeline

# Triggers — run on every push and every pull request to main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# =============================================================================
# STAGE 1 — Secrets Detection (Gitleaks)
# Status: Skeleton placeholder — full implementation Day 3
# =============================================================================
jobs:
  secret-scan:
    name: "Stage 1 — Secrets Detection"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0        # Required for full history scan

      - name: Run Gitleaks — Full History Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        with:
          args: --log-opts="--all" --report-format=json --report-path=gitleaks-report.json

      - name: Upload Gitleaks Report
        if: always()            # Upload even when the scan fails
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json

# =============================================================================
# STAGE 2 — SAST Scanning (SonarQube)
# Status: Skeleton placeholder — full implementation Day 3
# =============================================================================
  sast-scan:
    name: "Stage 2 — SAST Scanning"
    runs-on: ubuntu-latest
    needs: secret-scan         # Only runs if Stage 1 passes
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Hello World — Stage 2 placeholder
        run: |
          echo "============================================"
          echo "Stage 2: SAST Scanning — PLACEHOLDER"
          echo "Tool: SonarQube"
          echo "Gate: Hard-fail on CRITICAL/BLOCKER"
          echo "       Soft-fail on MAJOR/MINOR — route to AppSec"
          echo "Implementation: Day 3"
          echo "============================================"

# =============================================================================
# STAGE 3 — Container Image Scanning (Trivy)
# Status: Skeleton placeholder — full implementation Day 4
# =============================================================================
  image-scan:
    name: "Stage 3 — Container Image Scanning"
    runs-on: ubuntu-latest
    needs: sast-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Hello World — Stage 3 placeholder
        run: |
          echo "============================================"
          echo "Stage 3: Container Image Scanning — PLACEHOLDER"
          echo "Tool: Trivy"
          echo "Gate: Hard-fail on CRITICAL/HIGH CVEs"
          echo "Implementation: Day 4"
          echo "============================================"

# =============================================================================
# STAGE 4 — IaC and Kubernetes Scanning (Trivy + Checkov)
# Status: Skeleton placeholder — full implementation Day 4
# =============================================================================
  iac-scan:
    name: "Stage 4 — IaC and Kubernetes Scanning"
    runs-on: ubuntu-latest
    needs: image-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Hello World — Stage 4 placeholder
        run: |
          echo "============================================"
          echo "Stage 4: IaC and K8s Scanning — PLACEHOLDER"
          echo "Tools: Trivy (K8s manifests) + Checkov (Terraform)"
          echo "Gate: Hard-fail on CRITICAL/HIGH misconfigurations"
          echo "Implementation: Day 4"
          echo "============================================"

# =============================================================================
# STAGE 5 — Security Gate (Aggregation and Differentiated Policy)
# Status: Skeleton placeholder — full implementation Day 5
# =============================================================================
  security-gate:
    name: "Stage 5 — Security Gate"
    runs-on: ubuntu-latest
    needs: [secret-scan, sast-scan, image-scan, iac-scan]
    steps:
      - name: Hello World — Stage 5 placeholder
        run: |
          echo "============================================"
          echo "Stage 5: Security Gate — PLACEHOLDER"
          echo "Action: Aggregate all scanner outputs"
          echo "        Post PR comment with owner attribution"
          echo "        DevSecOps findings: block merge"
          echo "        AppSec findings: route, do not block"
          echo "Implementation: Day 5"
          echo "============================================"

# =============================================================================
# STAGE 6 — Image Signing and SBOM (Cosign + Trivy)
# Status: Skeleton placeholder — full implementation Day 5
# =============================================================================
  image-sign:
    name: "Stage 6 — Image Signing and SBOM"
    runs-on: ubuntu-latest
    needs: security-gate
    steps:
      - name: Hello World — Stage 6 placeholder
        run: |
          echo "============================================"
          echo "Stage 6: Image Signing and SBOM — PLACEHOLDER"
          echo "Tools: Cosign (signing) + Trivy (SBOM generation)"
          echo "Action: Sign all images that pass security gate"
          echo "        Generate SPDX SBOM attestation"
          echo "Implementation: Day 5"
          echo "============================================"

# =============================================================================
# STAGE 7 — DAST Scanning (OWASP ZAP)
# Status: Skeleton placeholder — full implementation Day 5
# =============================================================================
  dast-scan:
    name: "Stage 7 — DAST Scanning"
    runs-on: ubuntu-latest
    needs: security-gate
    steps:
      - name: Hello World — Stage 7 placeholder
        run: |
          echo "============================================"
          echo "Stage 7: DAST Scanning — PLACEHOLDER"
          echo "Tool: OWASP ZAP"
          echo "Gate: Soft-fail — route findings to AppSec"
          echo "      Pipeline does NOT hard-fail on HIGH ZAP findings"
          echo "Implementation: Day 5"
          echo "============================================"