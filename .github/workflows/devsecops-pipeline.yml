# =============================================================================
# SecureFlow DevSecOps Pipeline
# VaultBridge Financial Technologies
# =============================================================================
# This pipeline enforces a differentiated gate policy:
#   - DevSecOps-owned findings (secrets, CVEs, IaC, K8s): HARD-FAIL
#   - AppSec-owned findings (SQLi, IDOR, XSS, CSRF):      SOFT-FAIL + route
# =============================================================================

name: SecureFlow DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:

# =============================================================================
# STAGE 1 — Secrets Detection (Gitleaks)
# Gate: Hard-fail on ANY finding
# =============================================================================
  secret-scan:
    name: "Stage 1 — Secrets Detection"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.4_linux_x64.tar.gz
          sudo mv gitleaks /usr/local/bin/
          echo "Gitleaks version:"
          gitleaks version

      - name: Run Gitleaks Full History Scan
        run: |
          echo "============================================"
          echo "Running Gitleaks full history scan"
          echo "Scanning ALL commits in Git history"
          echo "Gate: Hard-fail on ANY secret found"
          echo "============================================"
          gitleaks detect \
            --source . \
            --log-opts="--all" \
            --report-format=json \
            --report-path=gitleaks-report.json \
            --config=.gitleaks.toml \
            --verbose \
            --exit-code=1

      - name: Show Findings Summary
        if: always()
        run: |
          echo "============================================"
          echo "GITLEAKS FINDINGS SUMMARY"
          echo "============================================"
          if [ -f gitleaks-report.json ]; then
            python3 -c "
          import json, sys
          with open('gitleaks-report.json') as f:
              content = f.read().strip()
          if not content:
              print('Report is empty — no findings')
              sys.exit(0)
          findings = json.loads(content)
          if isinstance(findings, list):
              print(f'Total secrets found: {len(findings)}')
              for item in findings:
                  print(f'  FOUND: {item.get(\"Description\",\"unknown\")}')
                  print(f'         File:   {item.get(\"File\",\"unknown\")}')
                  print(f'         Line:   {item.get(\"StartLine\",\"?\")}')
                  print(f'         Commit: {str(item.get(\"Commit\",\"?\"))[:8]}')
                  print(f'         Match:  {item.get(\"Match\",\"?\")[:50]}')
                  print()
          "
          else
            echo "No report file generated"
          fi

      - name: Upload Gitleaks Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          if-no-files-found: warn

      - name: Create Security Issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open"
            });

            const existing = issues.find(
              issue => issue.title === "Gitleaks detected secrets"
            );

            if (!existing) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: "Gitleaks detected secrets",
                body: `## Gitleaks Secret Detection Alert\n\nA Gitleaks scan detected one or more committed secrets in this repository.\n\n**Immediate Actions Required:**\n1. Download the \`gitleaks-report\` artifact from the failed workflow run\n2. Identify which secrets were found and in which commits\n3. Rotate ALL exposed credentials immediately in their respective systems\n4. Rewrite Git history using git-filter-repo to remove secrets from all commits\n5. Verify the pipeline passes after remediation\n\n**Workflow Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n**Owner:** DevSecOps Team\n**Severity:** CRITICAL\n**SLA:** Immediate rotation required — do not merge until resolved`,
                labels: ["security"]
              });
            }

# =============================================================================
# STAGE 2 — SAST Scanning (SonarQube)
# Gate: DIFFERENTIATED — Hard-fail only on DevSecOps-owned CRITICAL/BLOCKER.
# Application-layer findings (services/*) route to AppSec without blocking.
# =============================================================================
  sast-scan:
    name: "Stage 2 — SAST Scanning"
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0        # Required for SonarQube blame data

      - name: Run SonarQube SAST Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Check SonarQube Quality Gate (Differentiated)
        id: sonarqube-check
        run: |
          echo "Fetching SonarQube findings for differentiated gate evaluation..."

          # Wait for analysis to be processed server-side
          sleep 15

          # Fetch all unresolved issues
          curl -s -u "${{ secrets.SONAR_TOKEN }}:" \
            "https://sonarcloud.io/api/issues/search?projectKeys=asochi07_Amdari-Project02&resolved=false&ps=500" \
            -o sonar-gate-issues.json

          # Differentiated gate: classify each finding by ownership path.
          # DevSecOps owns infrastructure & pipeline config — those hard-fail on
          # CRITICAL/BLOCKER. Application source (services/*) routes to AppSec.
          python3 << 'EOF'
          import json, sys, os

          with open('sonar-gate-issues.json') as f:
              data = json.load(f)

          issues = data.get('issues', [])

          def owner(component):
              path = component.split(':', 1)[-1]
              if path.startswith('infra/'):
                  return 'DEVSECOPS'
              if path.startswith('.github/'):
                  return 'DEVSECOPS'
              if path.startswith('services/'):
                  return 'APPSEC'
              return 'APPSEC'  # default unknowns to AppSec (routes, never blocks)

          BLOCKING_SEV = {'BLOCKER', 'CRITICAL'}
          devsecops_blocking = []
          appsec_routed = []

          for i in issues:
              o = owner(i.get('component', ''))
              sev = i.get('severity', 'UNKNOWN')
              loc = i.get('component', '').split(':', 1)[-1]
              rec = f"[{sev}] {loc}:{i.get('line','?')} — {i.get('message','')}"
              if o == 'DEVSECOPS' and sev in BLOCKING_SEV:
                  devsecops_blocking.append(rec)
              else:
                  appsec_routed.append(rec)

          print("=" * 60)
          print("SONARQUBE DIFFERENTIATED GATE EVALUATION")
          print("=" * 60)
          print(f"Total findings: {len(issues)}")
          print(f"DevSecOps-owned blocking (CRITICAL/BLOCKER): {len(devsecops_blocking)}")
          print(f"AppSec-routed (non-blocking): {len(appsec_routed)}")
          print()

          if appsec_routed:
              print("--- ROUTED TO APPSEC (does not block delivery) ---")
              for r in appsec_routed:
                  print("  " + r)
              print()

          # Expose status for the security gate
          status = "FAIL" if devsecops_blocking else "PASS"
          gh = os.environ.get('GITHUB_OUTPUT')
          if gh:
              with open(gh, 'a') as out:
                  out.write(f"sonar_status={status}\n")

          if devsecops_blocking:
              print("--- DEVSECOPS-OWNED BLOCKING FINDINGS ---")
              for r in devsecops_blocking:
                  print("  " + r)
              print()
              print("HARD-FAIL: DevSecOps-owned CRITICAL/BLOCKER findings present.")
              sys.exit(1)
          else:
              print("PASS: No DevSecOps-owned CRITICAL/BLOCKER findings.")
              print("Application-layer findings routed to AppSec intake — pipeline continues.")
          EOF

      - name: Export SonarQube Findings to JSON
        if: always()
        run: |
          echo "Exporting SonarQube findings for security gate consumption..."

          curl -s -u "${{ secrets.SONAR_TOKEN }}:" \
            "https://sonarcloud.io/api/issues/search?projectKeys=asochi07_Amdari-Project02&resolved=false&ps=500" \
            -o sonarqube-findings.json

          echo "Findings exported to sonarqube-findings.json"
          python3 -c "
          import json
          with open('sonarqube-findings.json') as f:
              data = json.load(f)
          total = data.get('total', 0)
          issues = data.get('issues', [])
          severities = {}
          for issue in issues:
              sev = issue.get('severity', 'UNKNOWN')
              severities[sev] = severities.get(sev, 0) + 1
          print(f'Total findings: {total}')
          print(f'By severity: {severities}')
          "

      - name: Upload SonarQube Findings Artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonarqube-findings
          path: sonarqube-findings.json

# =============================================================================
# STAGE 3 — Container Image Scanning (Trivy)
# Gate: Hard-fail on CRITICAL/HIGH CVEs
# =============================================================================
  image-scan:
    name: "Stage 3 — Container Image Scanning"
    runs-on: ubuntu-latest
    needs: sast-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          echo "Trivy version:"
          trivy --version

      - name: Build Service Images
        run: |
          echo "============================================"
          echo "Building all three SecureFlow service images"
          echo "============================================"
          docker build -t secureflow/auth-service:test ./services/auth-service
          docker build -t secureflow/frontend:test ./services/frontend
          docker build -t secureflow/transaction-service:test ./services/transaction-service
          echo "All images built successfully"

      - name: Scan auth-service Image
        run: |
          echo "============================================"
          echo "Scanning auth-service for CVEs"
          echo "============================================"
          trivy image \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 1 \
            --format json \
            --output trivy-auth-service.json \
            --no-progress \
            secureflow/auth-service:test || true
          trivy image \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 0 \
            --format table \
            --no-progress \
            secureflow/auth-service:test

      - name: Scan frontend Image
        run: |
          echo "============================================"
          echo "Scanning frontend for CVEs"
          echo "============================================"
          trivy image \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 1 \
            --format json \
            --output trivy-frontend.json \
            --no-progress \
            secureflow/frontend:test || true
          trivy image \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 0 \
            --format table \
            --no-progress \
            secureflow/frontend:test

      - name: Scan transaction-service Image
        run: |
          echo "============================================"
          echo "Scanning transaction-service for CVEs"
          echo "============================================"
          trivy image \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 1 \
            --format json \
            --output trivy-transaction-service.json \
            --no-progress \
            secureflow/transaction-service:test || true
          trivy image \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 0 \
            --format table \
            --no-progress \
            secureflow/transaction-service:test

      - name: Enforce Gate — Hard-Fail on CRITICAL/HIGH CVEs
        run: |
          echo "============================================"
          echo "STAGE 3 SECURITY GATE — CVE CHECK"
          echo "============================================"
          FAIL=0
          for IMAGE in auth-service frontend transaction-service; do
            REPORT="trivy-${IMAGE}.json"
            if [ -f "$REPORT" ]; then
              CRITICAL=$(python3 -c "
          import json
          with open('${REPORT}') as f:
              data = json.load(f)
          count = 0
          for result in data.get('Results', []):
              for vuln in result.get('Vulnerabilities', []):
                  if vuln.get('Severity') == 'CRITICAL':
                      count += 1
          print(count)
          " 2>/dev/null || echo "0")
              HIGH=$(python3 -c "
          import json
          with open('${REPORT}') as f:
              data = json.load(f)
          count = 0
          for result in data.get('Results', []):
              for vuln in result.get('Vulnerabilities', []):
                  if vuln.get('Severity') == 'HIGH':
                      count += 1
          print(count)
          " 2>/dev/null || echo "0")
              echo "  ${IMAGE}: CRITICAL=${CRITICAL} HIGH=${HIGH}"
              if [ "$CRITICAL" -gt "0" ] || [ "$HIGH" -gt "0" ]; then
                FAIL=1
              fi
            fi
          done
          if [ "$FAIL" -eq "1" ]; then
            echo ""
            echo "HARD-FAIL: CRITICAL or HIGH CVEs found in service images"
            echo "Remediation: ensure base image is python:3.12-slim and dependencies patched"
            echo "Note: unfixed CVEs (no upstream patch) are excluded via --ignore-unfixed"
            exit 1
          else
            echo "All images passed CVE scan"
          fi

      - name: Upload Trivy Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-reports
          path: |
            trivy-auth-service.json
            trivy-frontend.json
            trivy-transaction-service.json
          if-no-files-found: warn

# =============================================================================
# STAGE 4 — IaC and Kubernetes Scanning (Trivy + Checkov)
# Gate: Hard-fail on CRITICAL/HIGH misconfigurations
# =============================================================================
  iac-scan:
    name: "Stage 4 — IaC and Kubernetes Scanning"
    runs-on: ubuntu-latest
    needs: image-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          echo "Trivy version:"
          trivy --version

      - name: Install Checkov
        run: |
          pip install checkov --quiet
          checkov --version

      - name: Trivy — Scan Kubernetes Manifests
        run: |
          echo "============================================"
          echo "Trivy K8s Manifest Scan"
          echo "Target: infra/kubernetes/"
          echo "Gate: Hard-fail on CRITICAL/HIGH"
          echo "============================================"
          trivy config \
            --severity CRITICAL,HIGH \
            --exit-code 0 \
            --format json \
            --output trivy-k8s-report.json \
            infra/kubernetes/ || true
          trivy config \
            --severity CRITICAL,HIGH \
            --exit-code 0 \
            --format table \
            infra/kubernetes/

      - name: Show Trivy K8s Findings Summary
        if: always()
        run: |
          echo "============================================"
          echo "TRIVY K8s FINDINGS SUMMARY"
          echo "============================================"
          if [ -f trivy-k8s-report.json ]; then
            python3 -c "
          import json
          with open('trivy-k8s-report.json') as f:
              data = json.load(f)
          total_critical = 0
          total_high = 0
          for result in data.get('Results', []):
              target = result.get('Target', 'unknown')
              misconfigs = result.get('Misconfigurations', [])
              if misconfigs:
                  print(f'File: {target}')
                  for m in misconfigs:
                      sev = m.get('Severity','?')
                      title = m.get('Title','?')
                      mid = m.get('ID','?')
                      print(f'  [{sev}] {mid}: {title}')
                      if sev == 'CRITICAL': total_critical += 1
                      if sev == 'HIGH': total_high += 1
                  print()
          print(f'Total CRITICAL: {total_critical}')
          print(f'Total HIGH: {total_high}')
          "
          fi

      - name: Checkov — Scan Terraform Modules
        run: |
          echo "============================================"
          echo "Checkov Terraform IaC Scan"
          echo "Target: infra/terraform/"
          echo "Gate: Hard-fail on CRITICAL/HIGH"
          echo "============================================"
          checkov \
            --directory infra/terraform/ \
            --framework terraform \
            --output json \
            --output-file-path . \
            --quiet \
            --compact \
            --skip-check CKV_TF_1 \
            2>/dev/null || true
          checkov \
            --directory infra/terraform/ \
            --framework terraform \
            --output cli \
            --compact \
            --skip-check CKV_TF_1 \
            2>/dev/null || true

      - name: Show Checkov Findings Summary
        if: always()
        run: |
          echo "============================================"
          echo "CHECKOV FINDINGS SUMMARY"
          echo "============================================"
          if [ -f results_json.json ]; then
            python3 -c "
          import json
          with open('results_json.json') as f:
              data = json.load(f)
          results = data.get('results', {})
          failed = results.get('failed_checks', [])
          passed = results.get('passed_checks', [])
          print(f'Passed checks: {len(passed)}')
          print(f'Failed checks: {len(failed)}')
          print()
          print('Failed checks detail:')
          for check in failed:
              check_id = check.get('check_id','?')
              check_name = check.get('check','?')
              resource = check.get('resource','?')
              file_path = check.get('file_path','?')
              print(f'  FAILED: {check_id}')
              print(f'          Check: {check_name}')
              print(f'          Resource: {resource}')
              print(f'          File: {file_path}')
              print()
          " 2>/dev/null || echo "Could not parse Checkov JSON output"
          fi

      - name: Enforce Gate — Hard-Fail on CRITICAL/HIGH IaC Findings
        run: |
          echo "============================================"
          echo "STAGE 4 SECURITY GATE — IaC CHECK"
          echo "============================================"
          FAIL=0

          # Check Trivy K8s results
          if [ -f trivy-k8s-report.json ]; then
            K8S_CRITICAL=$(python3 -c "
          import json
          with open('trivy-k8s-report.json') as f:
              data = json.load(f)
          count = sum(1 for r in data.get('Results',[]) for m in r.get('Misconfigurations',[]) if m.get('Severity')=='CRITICAL')
          print(count)
          " 2>/dev/null || echo "0")
            K8S_HIGH=$(python3 -c "
          import json
          with open('trivy-k8s-report.json') as f:
              data = json.load(f)
          count = sum(1 for r in data.get('Results',[]) for m in r.get('Misconfigurations',[]) if m.get('Severity')=='HIGH')
          print(count)
          " 2>/dev/null || echo "0")
            echo "  Trivy K8s: CRITICAL=${K8S_CRITICAL} HIGH=${K8S_HIGH}"
            if [ "$K8S_CRITICAL" -gt "0" ] || [ "$K8S_HIGH" -gt "0" ]; then
              FAIL=1
            fi
          fi

          # Check Checkov results
          if [ -f results_json.json ]; then
            CHECKOV_FAILED=$(python3 -c "
          import json
          with open('results_json.json') as f:
              data = json.load(f)
          print(len(data.get('results',{}).get('failed_checks',[])))
          " 2>/dev/null || echo "0")
            echo "  Checkov: Failed checks=${CHECKOV_FAILED}"
            if [ "$CHECKOV_FAILED" -gt "0" ]; then
              FAIL=1
            fi
          fi

          if [ "$FAIL" -eq "1" ]; then
            echo ""
            echo "HARD-FAIL: CRITICAL/HIGH IaC or K8s misconfigurations found"
            echo "DevSecOps-owned findings will be remediated in Week 2"
            exit 1
          else
            echo "All IaC and K8s checks passed"
          fi

      - name: Upload IaC Scan Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iac-scan-reports
          path: |
            trivy-k8s-report.json
            results_json.json
          if-no-files-found: warn


# =============================================================================
# STAGE 5 — Security Gate (Aggregation and Differentiated Policy)
# Aggregates all scanner outputs, applies ownership rules, posts PR comment
# =============================================================================
  security-gate:
    name: "Stage 5 — Security Gate"
    runs-on: ubuntu-latest
    needs: [secret-scan, sast-scan, image-scan, iac-scan]
    if: always()    # Run even if upstream stages failed, to aggregate results
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Download All Scanner Artefacts
        uses: actions/download-artifact@v4
        with:
          path: scan-results
        continue-on-error: true

      - name: Aggregate Findings and Apply Gate Policy
        id: gate
        run: |
          echo "============================================"
          echo "SECURITY GATE — AGGREGATING ALL FINDINGS"
          echo "============================================"

          DEVSECOPS_FAIL=0
          APPSEC_COUNT=0

          # Check upstream job results
          echo "Upstream stage results:"
          echo "  Stage 1 (Gitleaks):   ${{ needs.secret-scan.result }}"
          echo "  Stage 2 (SonarQube):  ${{ needs.sast-scan.result }}"
          echo "  Stage 3 (Trivy):      ${{ needs.image-scan.result }}"
          echo "  Stage 4 (IaC):        ${{ needs.iac-scan.result }}"
          echo ""

          # DevSecOps-owned stages — any failure is a hard-fail
          if [ "${{ needs.secret-scan.result }}" = "failure" ]; then
            echo "  DEVSECOPS HARD-FAIL: Secrets detected (Stage 1)"
            DEVSECOPS_FAIL=1
          fi
          if [ "${{ needs.image-scan.result }}" = "failure" ]; then
            echo "  DEVSECOPS HARD-FAIL: Container CVEs detected (Stage 3)"
            DEVSECOPS_FAIL=1
          fi
          if [ "${{ needs.iac-scan.result }}" = "failure" ]; then
            echo "  DEVSECOPS HARD-FAIL: IaC/K8s misconfigurations (Stage 4)"
            DEVSECOPS_FAIL=1
          fi

          # SonarQube — hard-fail only on CRITICAL/BLOCKER
          if [ "${{ needs.sast-scan.result }}" = "failure" ]; then
            echo "  DEVSECOPS HARD-FAIL: SonarQube CRITICAL/BLOCKER (Stage 2)"
            DEVSECOPS_FAIL=1
          fi

          echo "DEVSECOPS_FAIL=$DEVSECOPS_FAIL" >> $GITHUB_OUTPUT
          echo ""
          echo "============================================"
          if [ "$DEVSECOPS_FAIL" -eq "1" ]; then
            echo "GATE DECISION: BLOCK MERGE"
            echo "DevSecOps-owned CRITICAL findings present"
          else
            echo "GATE DECISION: ALLOW MERGE"
            echo "No DevSecOps-owned blocking findings"
          fi
          echo "============================================"

      - name: Post Security Gate PR Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const devsecopsFail = '${{ steps.gate.outputs.DEVSECOPS_FAIL }}' === '1';

            const secretResult = '${{ needs.secret-scan.result }}';
            const sastResult = '${{ needs.sast-scan.result }}';
            const imageResult = '${{ needs.image-scan.result }}';
            const iacResult = '${{ needs.iac-scan.result }}';

            const statusEmoji = (r) => r === 'success' ? 'PASS' : r === 'failure' ? 'FAIL' : 'SKIP';

            const body = `## SecureFlow Security Gate Report

            ### Gate Decision: ${devsecopsFail ? 'MERGE BLOCKED' : 'MERGE ALLOWED'}

            ---

            ### Section 1 — DevSecOps-Owned Findings (BLOCKING)

            These findings block the merge and must be remediated by the DevSecOps team.

            | Stage | Scanner | Result | Owner |
            |---|---|---|---|
            | 1 | Gitleaks (Secrets) | ${statusEmoji(secretResult)} | DevSecOps |
            | 3 | Trivy (Container CVEs) | ${statusEmoji(imageResult)} | DevSecOps |
            | 4 | Trivy K8s + Checkov (IaC) | ${statusEmoji(iacResult)} | DevSecOps |

            ${devsecopsFail ? '**Action required:** One or more DevSecOps-owned scanners failed. Download the scan artefacts, remediate the findings, and push again. Secrets findings require immediate credential rotation.' : 'No blocking DevSecOps findings.'}

            ---

            ### Section 2 — AppSec-Owned Findings (NON-BLOCKING — ROUTED)

            These findings are surfaced for the AppSec team. They do NOT block this merge.

            | Stage | Scanner | Result | Owner |
            |---|---|---|---|
            | 2 | SonarQube (SAST) | ${statusEmoji(sastResult)} | AppSec |
            | 7 | OWASP ZAP (DAST) | Pending Day 5 | AppSec |

            **AppSec Intake:** Findings have been routed to the AppSec review queue.
            **SLA:** Triage within 5 business days.

            ---

            ### Exception Process

            To request an exception for a specific finding, comment:
            \`/security-exception <finding-id> <justification>\`

            Note: Secrets findings are never eligible for exception.

            ---
            *Generated by SecureFlow Security Gate | Policy: docs/security-gate-policy.md*`;

            // Check for existing gate comment to update instead of duplicating
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const existing = comments.find(c =>
              c.body.includes('SecureFlow Security Gate Report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

      - name: Enforce Gate Decision
        run: |
          if [ "${{ steps.gate.outputs.DEVSECOPS_FAIL }}" = "1" ]; then
            echo "SECURITY GATE: BLOCKING MERGE"
            echo "DevSecOps-owned findings must be remediated"
            exit 1
          else
            echo "SECURITY GATE: MERGE ALLOWED"
          fi
# =============================================================================
# STAGE 6 — Image Signing and SBOM
# Pushes hardened images to GHCR, signs with Cosign, attaches SPDX SBOM.
# Runs only after the security gate passes — no failing build is ever signed.
# =============================================================================
  image-sign:
    name: "Stage 6 — Image Signing and SBOM"
    runs-on: ubuntu-latest
    needs: security-gate
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.7.0

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push hardened images
        id: build
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner=$OWNER" >> $GITHUB_OUTPUT
          for svc in auth-service frontend transaction-service; do
            IMG="ghcr.io/$OWNER/secureflow-$svc:hardened"
            docker build -t "$IMG" ./services/$svc
            docker push "$IMG"
            echo "Pushed $IMG"
          done

      - name: Generate SPDX SBOM per image
        run: |
          OWNER=${{ steps.build.outputs.owner }}
          for svc in auth-service frontend transaction-service; do
            IMG="ghcr.io/$OWNER/secureflow-$svc:hardened"
            trivy image --format spdx-json --output $svc-sbom.spdx.json "$IMG"
            echo "SBOM generated for $svc"
          done

      - name: Sign images and attach SBOM attestation
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          OWNER=${{ steps.build.outputs.owner }}
          echo "${{ secrets.COSIGN_PRIVATE_KEY }}" > cosign.key
          for svc in auth-service frontend transaction-service; do
            IMG="ghcr.io/$OWNER/secureflow-$svc:hardened"
            DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$IMG")
            echo "Signing $DIGEST ..."
            cosign sign --yes --key cosign.key "$DIGEST"
            cosign attest --yes --key cosign.key --predicate $svc-sbom.spdx.json --type spdxjson "$DIGEST"
            echo "Signed + attested: $svc"
          done
          rm -f cosign.key

      - name: Verify signatures
        run: |
          OWNER=${{ steps.build.outputs.owner }}
          for svc in auth-service frontend transaction-service; do
            IMG="ghcr.io/$OWNER/secureflow-$svc:hardened"
            DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$IMG")
            echo "Verifying $svc ..."
            cosign verify --key cosign.pub "$DIGEST"
          done

      - name: Upload SBOMs as artefacts
        uses: actions/upload-artifact@v4
        with:
          name: image-sboms
          path: "*-sbom.spdx.json"
# =============================================================================
# STAGE 7 — DAST Scanning (OWASP ZAP)
# Spins up the app, runs a ZAP baseline scan against it.
# Soft-fail ALWAYS — findings route to AppSec, never block the merge.
# =============================================================================
  dast-scan:
    name: "Stage 7 — DAST Scanning"
    runs-on: ubuntu-latest
    needs: security-gate
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Start the application stack
        run: |
          docker compose up -d --build
          echo "Waiting for services to come up..."
          sleep 30
          docker compose ps

      - name: Wait for frontend to respond
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:5000/ >/dev/null 2>&1; then
              echo "Frontend is up."
              break
            fi
            echo "  waiting ($i)..."
            sleep 5
          done

      - name: Run OWASP ZAP Baseline Scan
        continue-on-error: true   # SOFT-FAIL — DAST never blocks the merge
        run: |
          docker run --rm --network host \
            -v "$(pwd):/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:5000 \
            -J zap-report.json \
            -r zap-report.html \
            -I || true
          echo "ZAP scan complete (soft-fail — findings routed to AppSec)"

      - name: Summarise ZAP findings for AppSec
        if: always()
        run: |
          if [ -f zap-report.json ]; then
            python3 -c "
          import json
          with open('zap-report.json') as f:
              data = json.load(f)
          alerts = []
          for site in data.get('site', []):
              for a in site.get('alerts', []):
                  alerts.append((a.get('riskdesc','?'), a.get('alert','?'), a.get('count','?')))
          print('=' * 60)
          print('OWASP ZAP DAST — FINDINGS ROUTED TO APPSEC')
          print('=' * 60)
          print(f'Total alert types: {len(alerts)}')
          for risk, name, count in sorted(alerts, reverse=True):
              print(f'  [{risk}] {name} (x{count})')
          print()
          print('These are application-layer findings (AppSec-owned).')
          print('They do NOT block the merge per the gate policy.')
          "
          else
            echo "No ZAP report produced."
          fi

      - name: Tear down the stack
        if: always()
        run: docker compose down -v || true

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-dast-report
          path: |
            zap-report.json
            zap-report.html