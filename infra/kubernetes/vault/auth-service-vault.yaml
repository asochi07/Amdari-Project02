apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  labels:
    app: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "auth-service"
        vault.hashicorp.com/agent-inject-secret-config: "secureflow/data/auth-service"
        vault.hashicorp.com/agent-inject-template-config: |
          {{- with secret "secureflow/data/auth-service" -}}
          DB_PASSWORD={{ .Data.data.DB_PASSWORD }}
          JWT_SECRET={{ .Data.data.JWT_SECRET }}
          {{- end -}}
    spec:
      serviceAccountName: auth-service
      containers:
        - name: auth-service
          image: python:3.12-slim
          command: ["sleep", "3600"]