# secureflow-db-secrets — database credentials for the base manifests.
#
# IMPORTANT: This file contains PLACEHOLDERS only. Real values are supplied at
# deploy time and never committed. Apply real values with, e.g.:
#
#   kubectl create secret generic secureflow-db-secrets \
#     --namespace secureflow \
#     --from-literal=AUTH_DB_PASSWORD="$(openssl rand -base64 24)" \
#     --from-literal=TX_DB_PASSWORD="$(openssl rand -base64 24)" \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# In production these are sourced from Vault via the Vault Secrets Operator
# or External Secrets Operator, mirroring the Day 6 injection pattern.
apiVersion: v1
kind: Secret
metadata:
  name: secureflow-db-secrets
  namespace: secureflow
  labels:
    app.kubernetes.io/part-of: secureflow
type: Opaque
stringData:
  AUTH_DB_PASSWORD: "PLACEHOLDER_SET_AT_DEPLOY_TIME"
  TX_DB_PASSWORD: "PLACEHOLDER_SET_AT_DEPLOY_TIME"