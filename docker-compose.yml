# SecureFlow docker-compose — REMEDIATED (Week 2 Day 7).
# Remediations applied:
#   IV-01  DB passwords no longer hardcoded — read from untracked .env
#   IV-03  secrets externalised to .env (not committed)
#   IV-06  resource limits added to every service
#   IV-07  network segmentation via user-defined networks
#   CK-03  postgres image pinned to a specific SHA256 digest
# NOTE: For production, secrets are delivered via HashiCorp Vault (see Day 6).

version: "3.8"

services:
  auth-db:
    image: postgres:14@sha256:a209aced4fa19381231fae4d9a4c5816f7691294f13572f8bddc082ba32e1c7c
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: authuser
      POSTGRES_PASSWORD: REDACTED-ROTATED-SECRET
    ports:
      - "5432:5432"          # IV-02 — exposed on host.
    volumes:
      - ./db/auth/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - auth-db-data:/var/lib/postgresql/data

  transaction-db:
    image: postgres:14@sha256:a209aced4fa19381231fae4d9a4c5816f7691294f13572f8bddc082ba32e1c7c
    environment:
      POSTGRES_DB: transactiondb
      POSTGRES_USER: txuser
      POSTGRES_PASSWORD: REDACTED-ROTATED-SECRET
    ports:
      - "5433:5432"          # IV-02 — exposed on host.
    volumes:
      - ./db/transaction/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - transaction-db-data:/var/lib/postgresql/data

  auth-service:
    build: ./services/auth-service
    environment:
      DB_HOST: auth-db
      DB_PORT: 5432
      DB_NAME: authdb
      DB_USER: authuser
      DB_PASSWORD: REDACTED-ROTATED-SECRET        # IV-01, IV-03
      JWT_SECRET: REDACTED-ROTATED-SECRET # AV-07, IV-03
    ports:
      - "5001:5001"
    depends_on:
      - auth-db

  transaction-service:
    build: ./services/transaction-service
    environment:
      DB_HOST: transaction-db
      DB_PORT: 5432
      DB_NAME: transactiondb
      DB_USER: txuser
      DB_PASSWORD: REDACTED-ROTATED-SECRET           # IV-01, IV-03
      AUTH_SERVICE_URL: http://auth-service:5001
    ports:
      - "5002:5002"
    depends_on:
      - transaction-db
      - auth-service

  frontend:
    build: ./services/frontend
    environment:
      SESSION_SECRET: REDACTED-ROTATED-SECRET           # FV-03, IV-03
      AUTH_SERVICE_URL: http://auth-service:5001
      TRANSACTION_SERVICE_URL: http://transaction-service:5002
    ports:
      - "5000:5000"
    depends_on:
      - auth-service
      - transaction-service

volumes:
  auth-db-data:
  transaction-db-data:

# IV-06 — no `deploy.resources.limits` on any service.
# IV-07 — no user-defined network isolation; everything on the default bridge.
